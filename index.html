<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eiken Rhythmic Typing Challenge Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="combo-popup" class="combo-popup">5問連続正解！</div>

    <div class="timer-select-box" id="timer-setup-panel">
        ⏱️ れんしゅう時間：
        <select id="game-duration-select">
            <option value="5">5分間ゲーム</option>
            <option value="10">10分間ゲーム</option>
            <option value="15" selected>15分間ゲーム</option>
        </select>
    </div>

    <div class="timer-display" id="time-left-display" style="display:none;">⏱️ 残り時間: --:--</div>

    <div class="category-menu">
        <button class="nav-btn active" onclick="switchCategory('all', this)">全て</button>
        <button class="nav-btn" onclick="switchCategory('how', this)">4級 How</button>
        <button class="nav-btn" onclick="switchCategory('verbs', this)">4級 動詞</button>
        <button class="nav-btn" onclick="switchCategory('adj', this)">4級 形容詞</button>
        <button class="nav-btn" onclick="switchCategory('noun', this)">4級 名詞</button>
        <button class="nav-btn" onclick="switchCategory('prep', this)">4級 前置詞</button>
        
        <button class="nav-btn btn-3kyu" onclick="switchCategory('verbs3', this)">③級 動詞</button>
        <button class="nav-btn btn-3kyu" onclick="switchCategory('adj3', this)">③級 形容詞</button>
        <button class="nav-btn btn-3kyu" onclick="switchCategory('noun3', this)">③級 名詞</button>
        <button class="nav-btn btn-3kyu btn-idiom" onclick="switchCategory('idiom3', this)">③級 熟語特訓</button>
        
        <button class="nav-btn" id="revenge-tab-btn" style="display:none; background-color:#ffe2e2; border: 2px solid var(--error-color); color: var(--error-color); grid-column: span 3;" onclick="switchCategory('revenge', this)">🔥 リベンジモード</button>
        <button class="nav-btn" style="grid-column: span 3;" onclick="switchCategory('custom', this)">📥 自作カスタム単語</button>
    </div>

    <div class="shuffle-panel">
        <button id="shuffle-btn" class="shuffle-btn" onclick="toggleShuffle()">🔀 シャッフル：OFF</button>
    </div>

    <div id="word-display">Ready?</div>
    <div id="meaning-display">Press Start</div>
    
    <button id="action-btn" class="main-action" onclick="toggleApp()">START GAME</button>
    
    <div class="score-banner">
        <div>⭐ Score: <span id="score-val">0</span></div>
        <div>🎯 Combo: <span id="combo-val">0</span></div>
    </div>

    <div class="mastery-panel">
        <button class="mastery-btn" style="background-color: var(--success-color); color: #155e75;" onclick="markAsMastered()">💖 覚えた！隠す</button>
        <button class="mastery-btn" style="background-color: #fee2e2; color: #991b1b; font-size:0.75rem;" onclick="resetLocalStorage()">🔄 全初期化</button>
    </div>

    <div class="custom-entry-box">
        <h3>✨ 自分でオリジナル単語を追加</h3>
        <div class="input-group">
            <input type="text" id="custom-word" placeholder="例: play → plays">
            <input type="text" id="custom-meaning" placeholder="例: 遊ぶ → 遊んだ">
        </div>
        <button class="add-word-btn" onclick="addCustomWord()">単語を追加保存する</button>
    </div>

    <div class="controls">
        BGM Volume: <input type="range" id="volume" min="0" max="0.5" step="0.05" value="0.2">
    </div>
</div>

<audio id="bg-track-how" loop src="キラキラアイドル.mp3" style="display:none;"></audio>
<audio id="bg-track-verbs" loop src="Pop_swing.mp3" style="display:none;"></audio>
<audio id="bg-track-adj" loop src="Snack_time.mp3" style="display:none;"></audio>
<audio id="bg-track-noun" loop src="かわいいきみ。.mp3" style="display:none;"></audio>
<audio id="bg-track-idiom" loop src="わた雲を食べて.mp3" style="display:none;"></audio>

<script src="vocab.js"></script>
<script src="app.js"></script>
</body>
</html>
